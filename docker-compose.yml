version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: npr_news_db
    environment:
      POSTGRES_USER: npr_user
      POSTGRES_PASSWORD: npr_password
      POSTGRES_DB: npr_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U npr_user -d npr_news"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Adminer for database management (alternative to SQLAdmin)
  adminer:
    image: adminer
    container_name: npr_news_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
